name: Plan Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

# Restrict default workflow permissions to read-only for security (Least Privilege)
permissions:
  contents: read
  pull-requests: read

jobs:
  validate-plan:
    name: Validate Plan Gate
    runs-on: ubuntu-latest
    steps:
      - name: Parse and Validate Plan
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Checking PR gating rules..."
          echo "Branch name: $BRANCH_NAME"
          echo "PR Title: $PR_TITLE"

          IS_AGENT=false

          # 1. Check branch prefix
          if [[ "$BRANCH_NAME" =~ ^agent/ ]] || [[ "$BRANCH_NAME" =~ ^copilot/ ]]; then
            echo "Detected AI Agent based on branch prefix '$BRANCH_NAME'."
            IS_AGENT=true
          fi

          # 2. Check PR Title prefix
          if [[ "$PR_TITLE" =~ ^\[agent\] ]]; then
            echo "Detected AI Agent based on PR title prefix '[agent]'."
            IS_AGENT=true
          fi

          # 3. Check PR Body for Author Type: AI Agent
          if [[ "$PR_BODY" =~ "Author Type: AI Agent" ]] || [[ "$PR_BODY" =~ "Author Type: (AI Agent)" ]]; then
            echo "Detected AI Agent based on PR body content."
            IS_AGENT=true
          fi

          # 4. Enforce plan for agents
          if [ "$IS_AGENT" = "true" ]; then
            echo "Validating Plan Presence..."
            
            # Check if body is empty or null (Finding 2)
            if [ -z "$PR_BODY" ] || [ "$PR_BODY" = "null" ]; then
              echo "::error::PR body is empty! AI Agent PRs must include the '## 📋 Agentic Plan & Rationale' section."
              exit 1
            fi

            # Check for header presence
            if [[ ! "$PR_BODY" =~ "## 📋 Agentic Plan & Rationale" ]] && [[ ! "$PR_BODY" =~ "## Agentic Plan & Rationale" ]]; then
              echo "::error::Plan section missing! AI Agent PRs must include the '## 📋 Agentic Plan & Rationale' section."
              echo "=========================================================================================="
              echo "❌ PLAN GATE FAILURE"
              echo "=========================================================================================="
              echo "This PR was identified as being generated by an AI Agent, which requires a Plan-First"
              echo "governance review before code changes can be merged to main."
              echo ""
              echo "Please update your PR description to include the '## 📋 Agentic Plan & Rationale' header"
              echo "and complete the required plan and rationale checklists."
              echo ""
              echo "Refer to CONTRIBUTING.md for details: https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md#%F0%9F%93%8B-plan-first--author-differentiation"
              echo "=========================================================================================="
              exit 1
            fi
            
            # Check if they replaced the default placeholders (Finding 1)
            if [[ "$PR_BODY" == *"**Stated Goal:** (Describe the issue"* ]] || \
               [[ "$PR_BODY" == *"**Scope of Changes:** (List"* ]]; then
              echo "::error::Plan section contains default placeholders! Please fill in your actual goal and scope of changes."
              exit 1
            fi

            echo "✅ Plan validation successful!"
          else
            echo "=========================================================================================="
            echo "ℹ️ Plan Gate Bypassed"
            echo "=========================================================================================="
            echo "This PR appears to be authored by a Human Developer."
            echo "Plan enforcement is only active for AI Agents (branches starting with 'agent/' or 'copilot/', or PR titles starting with '[agent]')."
            echo "If this was an error, please ensure your branch name does not start with 'agent/' or 'copilot/'."
            echo "=========================================================================================="
          fi
