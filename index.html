<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mindful Meals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-primary: 107 155 127;
        --color-secondary: 123 167 188;
        --color-background-primary: 253 252 248;
        --color-background-secondary: 245 245 243;
        --color-neutral-light: 245 245 243;
        --color-neutral-medium: 138 138 134;
        --color-functional-success: 91 138 107;
        --color-functional-warning: 230 169 104;
        --color-functional-danger: 214 123 123;
        --color-functional-info: 244 208 111;
        --color-text-primary: 47 47 47;
        --color-text-secondary: 95 95 95;
        --color-energy-full-power: 74 155 99;
        --color-energy-cruising: 123 167 188;
        --color-energy-low-battery: 230 169 104;
        --color-energy-sos: 214 123 123;
      }
      .dark {
        --color-primary: 141 181 160;
        --color-secondary: 146 189 212;
        --color-background-primary: 26 27 30;
        --color-background-secondary: 37 38 41;
        --color-neutral-light: 47 48 51;
        --color-neutral-medium: 58 59 62;
        --color-functional-success: 123 175 138;
        --color-functional-warning: 242 185 122;
        --color-functional-danger: 225 153 153;
        --color-functional-info: 247 220 132;
        --color-text-primary: 240 240 240;
        --color-text-secondary: 184 184 184;
        --color-energy-full-power: 92 174 117;
        --color-energy-cruising: 146 189 212;
        --color-energy-low-battery: 242 185 122;
        --color-energy-sos: 225 153 153;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: rgb(var(--color-background-primary));
        color: rgb(var(--color-text-primary));
        transition: background-color 0.3s ease, color 0.3s ease;
      }
    </style>
  <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Poppins', 'sans-serif'],
            },
            colors: {
              primary: 'rgb(var(--color-primary) / <alpha-value>)',
              secondary: 'rgb(var(--color-secondary) / <alpha-value>)',
              background: {
                primary: 'rgb(var(--color-background-primary) / <alpha-value>)',
                secondary: 'rgb(var(--color-background-secondary) / <alpha-value>)',
              },
              neutral: {
                light: 'rgb(var(--color-neutral-light) / <alpha-value>)',
                medium: 'rgb(var(--color-neutral-medium) / <alpha-value>)',
              },
              functional: {
                success: 'rgb(var(--color-functional-success) / <alpha-value>)',
                warning: 'rgb(var(--color-functional-warning) / <alpha-value>)',
                danger: 'rgb(var(--color-functional-danger) / <alpha-value>)',
                info: 'rgb(var(--color-functional-info) / <alpha-value>)',
              },
              text: {
                primary: 'rgb(var(--color-text-primary) / <alpha-value>)',
                secondary: 'rgb(var(--color-text-secondary) / <alpha-value>)',
              },
              energy: {
                'full-power': 'rgb(var(--color-energy-full-power) / <alpha-value>)',
                'cruising': 'rgb(var(--color-energy-cruising) / <alpha-value>)',
                'low-battery': 'rgb(var(--color-energy-low-battery) / <alpha-value>)',
                'sos': 'rgb(var(--color-energy-sos) / <alpha-value>)',
              },
            },
          },
        },
      }
    </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.19.0"
  }
}
</script>
</head>
  <body class="bg-background-primary text-text-primary">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
